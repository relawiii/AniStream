kind = "web"
previewPath = "/"
title = "AniStream — Anime Release Tracker"
version = "1.0.0"
id = "artifacts/anime-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20818

[services.development]
run = "pnpm --filter @workspace/anime-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anime-tracker", "run", "build" ]
publicDir = "artifacts/anime-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20818"
BASE_PATH = "/"
